# ─── Shell ─────────────────────────────────────────────────── 
shell                                  zsh

# ─── Font ────────────────────────────────────────────────────
font_family                            Hack Nerd Font
font_size                              13
disable_ligatures                      never
adjust_line_height                     0
adjust_column_width                    0

# ─── Cursor ──────────────────────────────────────────────────
cursor_shape                           beam
cursor_beam_thickness                  1.5
cursor_underline_thickness             1
cursor                                 #c0caf5
cursor_text_color                      #1a1b26

# ─── Window ──────────────────────────────────────────────────
window_padding_width                   20
window_border_width                    1px
active_border_color                    #28344a
inactive_border_color                  #28344a
bell_border_color                      #28344a

# ─── Tabs ────────────────────────────────────────────────────
tab_bar_style                          powerline
active_tab_background                  #98c379
active_tab_font_style                  normal
inactive_tab_background                #e06c75
inactive_tab_foreground                #000000
inactive_tab_font_style                normal

# ─── URLs ────────────────────────────────────────────────────
detect_urls                            yes
url_color                              #61afef
url_style                              curly

# ─── Scrollbar ───────────────────────────────────────────────
scrollbar                              always
scrollbar_width                        0.5
scrollbar_handle_color                 #7aa2f7
scrollbar_track_color                  #28344a
scrollbar_radius                       0
scrollbar_gap                          0
scrollbar_min_handle_height            2.0
scrollbar_hover_width                  0.5
scrollbar_track_opacity                1.0
scrollbar_track_hover_opacity          1.0

# ─── Performance ─────────────────────────────────────────────
repaint_delay                          10
input_delay                            3
sync_to_monitor                        no

# ─── Miscellaneous ───────────────────────────────────────────
enable_audio_bell                      no
mouse_hide_wait                        0
confirm_os_window_close                0

# ─── Shortcuts ───────────────────────────────────────────────
map ctrl+left                          neighboring_window left
map ctrl+right                         neighboring_window right
map ctrl+up                            neighboring_window up
map ctrl+down                          neighboring_window down
map ctrl+shift+enter                   new_window_with_cwd
map ctrl+shift+t                       new_tab_with_cwd
map ctrl+shift+z                       toggle_layout stack
map f1                                 copy_to_buffer a
map f2                                 paste_from_buffer a
map f3                                 copy_to_buffer b
map f4                                 paste_from_buffer b

# ─── Base Colors ─────────────────────────────────────────────
foreground                             #a9b1d6
background                             #101419
background_opacity                     0.85
selection_foreground                   #7aa2f7
selection_background                   #28344a

# ─── Color Palette ───────────────────────────────────────────
# Black
color0 #888888                         color8  #888888

# Red
color1 #f7768e                         color9  #f7768e

# Green
color2 #73daca                         color10 #73daca

# Yellow
color3 #e0af68                         color11 #e0af68

# Blue
color4 #7aa2f7                         color12 #7aa2f7

# Magenta
color5 #bb9af7                         color13 #bb9af7

# Cyan
color6 #7dcfff                         color14 #7dcfff

# White
color7 #c0caf5                         color15 #c0caf5
